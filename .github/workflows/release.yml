name: Release

on:
  workflow_dispatch:
    inputs:
      publish_ref:
        description: "Branch, tag, or commit SHA to release"
        required: true
        default: "main"
        type: string
      version:
        description: "Release version/tag (leave empty to auto-generate vYYMM.N)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Build everything without publishing images or creating a GitHub release"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_VERSION: 1.91.1
  # scripts/ci/* default their workdir to GitLab's /app; point them at the
  # Actions checkout instead.
  CI_PROJECT_DIR: ${{ github.workspace }}
  GHCR_IMAGE: ghcr.io/croit/keepafloatd
  GHCR_DEV_IMAGE: ghcr.io/croit/keepafloatd/dev

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      commit: ${{ steps.prepare.outputs.commit }}
      prev_tag: ${{ steps.prepare.outputs.prev_tag }}
      dry_run: ${{ steps.prepare.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: prepare
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME}"
            COMMIT="${GITHUB_SHA}"
            DRY_RUN="false"
            git checkout --quiet "${COMMIT}"
          else
            REF="${{ inputs.publish_ref }}"
            VERSION_INPUT="${{ inputs.version }}"
            DRY_RUN="${{ inputs.dry_run }}"
            git checkout --quiet "${REF}"
            COMMIT="$(git rev-parse HEAD)"

            if [ -n "${VERSION_INPUT}" ]; then
              VERSION="${VERSION_INPUT}"
            else
              PUBLISH_REF="${REF}" ./scripts/ci/publish/version.sh
              # shellcheck disable=SC1091
              . ./version.env
            fi
          fi

          PREV_TAG="$(git tag --merged "${COMMIT}" -l 'v[0-9]*' | grep -E '^v[0-9]{4}\.[0-9]+$' | grep -v "^${VERSION}$" | sort -t. -k1,1 -k2,2n | tail -1 || true)"

          {
            echo "version=${VERSION}"
            echo "commit=${COMMIT}"
            echo "prev_tag=${PREV_TAG}"
            echo "dry_run=${DRY_RUN}"
          } >> "${GITHUB_OUTPUT}"

  build-binary:
    name: release binary (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            musl-tools \
            pkg-config
      - name: Install arm64 cross toolchain
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross
      - name: Stamp release version
        run: VERSION=${{ needs.prepare.outputs.version }} ./scripts/ci/build/set-version.sh
      # Static musl builds so the artifacts carry no glibc/GLIBC_* dependency and
      # run on any distro (e.g. el9's glibc 2.34) — same approach as the GitLab CI.
      - name: Build release binary
        run: |
          mkdir -p dist
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARGET=aarch64-unknown-linux-musl
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc
          else
            TARGET=x86_64-unknown-linux-musl
          fi
          rustup target add "${TARGET}"
          cargo build --release --locked --target "${TARGET}"
          cp "target/${TARGET}/release/keepafloatd" dist/keepafloatd-linux-${{ matrix.arch }}
          chmod +x dist/keepafloatd-linux-*
          if file dist/keepafloatd-linux-${{ matrix.arch }} | grep -q "dynamically linked"; then
            echo "ERROR: expected a static musl build" >&2
            file dist/keepafloatd-linux-${{ matrix.arch }} >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v5
        with:
          name: release-binary-${{ matrix.arch }}
          path: dist/keepafloatd-linux-${{ matrix.arch }}

  build-deb:
    name: release deb (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Debian packaging dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            dpkg-dev \
            file \
            git \
            liblzma-dev \
            musl-tools \
            pkg-config \
            xz-utils
      - name: Install arm64 cross toolchain
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Stamp release version
        run: VERSION=${{ needs.prepare.outputs.version }} ./scripts/ci/build/set-version.sh
      # Static musl build so the .deb's $auto depends carries no libc6 (>= X)
      # constraint and installs on older glibc distros — same as the GitLab CI.
      - name: Build Debian package
        run: |
          mkdir -p dist
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARGET=aarch64-unknown-linux-musl
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc
          else
            TARGET=x86_64-unknown-linux-musl
          fi
          rustup target add "${TARGET}"
          cargo build --release --locked --target "${TARGET}"
          if file "target/${TARGET}/release/keepafloatd" | grep -q "dynamically linked"; then
            echo "ERROR: expected a static musl build" >&2
            exit 1
          fi
          cargo deb --no-build --no-strip --target "${TARGET}"
          find target -type f -name "*_${{ matrix.arch }}.deb" -exec cp {} dist/ \;
      - uses: actions/upload-artifact@v5
        with:
          name: release-deb-${{ matrix.arch }}
          path: dist/*_${{ matrix.arch }}.deb

  build-rpm:
    name: release rpm (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Install packaging dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            musl-tools \
            pkg-config
      - name: Install arm64 cross toolchain
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked
      - name: Stamp release version
        run: VERSION=${{ needs.prepare.outputs.version }} ./scripts/ci/build/set-version.sh
      # Static musl build so the rpm carries no glibc dependency (installs on
      # el9's glibc 2.34 and anything newer) — same as the GitLab CI.
      - name: Build RPM package
        run: |
          mkdir -p dist
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARGET=aarch64-unknown-linux-musl
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc
          else
            TARGET=x86_64-unknown-linux-musl
          fi
          rustup target add "${TARGET}"
          cargo build --release --locked --target "${TARGET}"
          if file "target/${TARGET}/release/keepafloatd" | grep -q "dynamically linked"; then
            echo "ERROR: expected a static musl build" >&2
            exit 1
          fi
          cargo generate-rpm --target "${TARGET}"
          find target -type f -name '*.rpm' -exec cp {} dist/ \;
      - uses: actions/upload-artifact@v5
        with:
          name: release-rpm-${{ matrix.arch }}
          path: dist/*.rpm

  build-source-tarball:
    name: release source tarball
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Build vendored source tarball
        run: VERSION=${{ needs.prepare.outputs.version }} ./scripts/ci/build/source-tarball.sh
      - name: Verify it builds fully offline
        run: ./scripts/ci/test/source-build.sh
      - uses: actions/upload-artifact@v5
        with:
          name: release-source
          path: dist/keepafloatd-*.tar.gz

  build-images:
    name: release images
    runs-on: ubuntu-latest
    # Depend on the per-arch binary builds so the runtime image copies those pre-cross-compiled
    # binaries instead of recompiling under QEMU emulation — the old multi-arch in-image compile was
    # the dominant release cost.
    needs: [prepare, build-binary]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - name: Fetch pre-built release binaries
        uses: actions/download-artifact@v5
        with:
          pattern: release-binary-*
          merge-multiple: true
          path: dist
      - name: Restore binary permissions
        run: chmod 0755 dist/keepafloatd-linux-*
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: needs.prepare.outputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-dist
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.prepare.outputs.dry_run != 'true' }}
          provenance: false
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ needs.prepare.outputs.version }}
            ${{ env.GHCR_IMAGE }}:sha-${{ needs.prepare.outputs.commit }}
            ${{ env.GHCR_IMAGE }}:latest
      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          # amd64 only: the dev image bundles the full Rust toolchain + a from-source cargo-tarpaulin
          # build; doing that for arm64 under QEMU emulation dominated release time for a
          # rarely-used local-development convenience image.
          platforms: linux/amd64
          push: ${{ needs.prepare.outputs.dry_run != 'true' }}
          provenance: false
          tags: |
            ${{ env.GHCR_DEV_IMAGE }}:${{ needs.prepare.outputs.version }}
            ${{ env.GHCR_DEV_IMAGE }}:sha-${{ needs.prepare.outputs.commit }}

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-binary
      - build-deb
      - build-rpm
      - build-source-tarball
      - build-images
    if: needs.prepare.outputs.dry_run != 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: actions/download-artifact@v5
        with:
          pattern: release-binary-*
          path: release-assets/
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          pattern: release-deb-*
          path: release-assets/
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          pattern: release-rpm-*
          path: release-assets/
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          name: release-source
          path: release-assets/
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="release-notes.md"
          if [ -n "${{ needs.prepare.outputs.prev_tag }}" ]; then
            git log "${{ needs.prepare.outputs.prev_tag }}..${{ needs.prepare.outputs.commit }}" \
              --pretty=format:'* %s (%h)' | head -50 > "${NOTES_FILE}"
          else
            git log "${{ needs.prepare.outputs.commit }}" \
              --pretty=format:'* %s (%h)' | head -50 > "${NOTES_FILE}"
          fi

          if [ ! -s "${NOTES_FILE}" ]; then
            echo "No new commits." > "${NOTES_FILE}"
          fi

          cat >> "${NOTES_FILE}" <<EOF

          ## Container Images

          Runtime:
          \`\`\`
          docker pull ${{ env.GHCR_IMAGE }}:${{ needs.prepare.outputs.version }}
          \`\`\`

          Dev:
          \`\`\`
          docker pull ${{ env.GHCR_DEV_IMAGE }}:${{ needs.prepare.outputs.version }}
          \`\`\`

          ## Verify downloads

          \`\`\`
          sha256sum --check SHA256SUMS --ignore-missing
          \`\`\`
          EOF
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.prepare.outputs.version }}" \
            release-assets/* \
            --repo "${{ github.repository }}" \
            --target "${{ needs.prepare.outputs.commit }}" \
            --title "${{ needs.prepare.outputs.version }}" \
            --notes-file release-notes.md
